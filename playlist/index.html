  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #2B3B8A;
      font-family: 'Quicksand', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      color: #1e1e2a;
    }

    .deco {
      position: fixed;
      pointer-events: none;
      z-index: 1;
      font-size: 1.6rem;
      opacity: 0.3;
      animation: floatAround 18s infinite ease-in-out;
    }

    @keyframes floatAround {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-25px) rotate(8deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    .app-container {
      display: flex;
      flex-direction: row;
      min-height: 100vh;
      position: relative;
      z-index: 2;
    }

    .main-content {
      flex: 1;
      padding: 2rem 2rem 2rem 2rem;
      transition: all 0.3s ease;
      max-width: calc(100% - 380px);
    }

    .player-card {
      background: rgba(255, 245, 240, 0.1);
      backdrop-filter: blur(8px);
      border-radius: 2rem;
      padding: 1.2rem;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 200, 0.25);
      margin-bottom: 2rem;
    }

    .greeting {
      font-size: 1.7rem;
      font-weight: 700;
      background: linear-gradient(135deg, #FFE484, #FFB347, #FF69B4);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
      display: inline-block;
    }

    .sub-love {
      color: #FFD966;
      margin-bottom: 1rem;
      font-weight: 500;
      border-left: 4px solid #ff99cc;
      padding-left: 0.8rem;
    }

    iframe {
      border-radius: 1.2rem;
      transition: all 0.2s;
      width: 100%;
    }

    /* DRAWER */
    .drawer {
      position: fixed;
      top: 0;
      right: -420px;
      width: 400px;
      height: 100vh;
      background: rgba(255, 248, 245, 0.97);
      backdrop-filter: blur(12px);
      box-shadow: -8px 0 30px rgba(0, 0, 0, 0.3);
      z-index: 1000;
      transition: right 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      border-left: 5px solid #FFB7C5;
      font-family: 'Quicksand', sans-serif;
      color: #2c2c2c;
    }

    .drawer.open {
      right: 0;
    }

    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 1.5rem;
      background: #FFE5EC;
      border-bottom: 2px solid #ffb3c6;
      position: sticky;
      top: 0;
      background: #ffecf0;
      z-index: 5;
    }

    .drawer-header h3 {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(125deg, #D43F6B, #FF8C42);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .close-drawer {
      background: none;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      color: #bf4e6e;
      transition: transform 0.2s;
    }

    .close-drawer:hover {
      transform: rotate(90deg);
      color: #ff2e63;
    }

    .gallery-section {
      padding: 1rem 1.2rem;
    }

    .gallery-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #c44f6f;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border-bottom: 2px dashed #ffb3c6;
      display: inline-block;
    }

    .photo-scatter {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 2rem;
    }

    .thumb-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 20px;
      box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
      cursor: pointer;
      transition: all 0.25s ease;
      border: 3px solid #fff7e8;
    }

    .thumb-img:hover {
      transform: scale(1.03) rotate(1deg);
      box-shadow: 0 12px 22px rgba(0, 0, 0, 0.3);
      border-color: #ffb347;
    }

    .love-message-box {
      background: rgba(255, 235, 215, 0.7);
      border-radius: 28px;
      padding: 1.2rem;
      margin: 0.8rem 1.2rem 1rem 1.2rem;
      border: 1px solid #ffbf91;
      box-shadow: inset 0 0 0 1px #fff9f0, 0 5px 12px rgba(0,0,0,0.05);
    }

    .love-text {
      font-size: 0.85rem;
      line-height: 1.55;
      font-weight: 500;
      color: #2b2a2f;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 45vh;
      overflow-y: auto;
      padding-right: 6px;
    }

    .love-text::-webkit-scrollbar {
      width: 4px;
    }

    .love-text::-webkit-scrollbar-track {
      background: #ffcdb0;
      border-radius: 10px;
    }

    .love-text::-webkit-scrollbar-thumb {
      background: #ff8a5c;
      border-radius: 10px;
    }

    /* extra close drawer button */
    .close-drawer-btn-bottom {
      display: flex;
      justify-content: center;
      margin: 0.5rem 1.2rem 1.8rem 1.2rem;
    }

    .close-drawer-bottom {
      background: #ff99bb;
      border: none;
      padding: 0.7rem 1.5rem;
      border-radius: 40px;
      font-weight: bold;
      font-size: 0.9rem;
      color: #2d2a2e;
      cursor: pointer;
      transition: 0.2s;
      width: 100%;
      font-family: 'Quicksand', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .close-drawer-bottom:hover {
      background: #ff7aa8;
      transform: scale(0.98);
      color: white;
    }

    .drawer-toggle-btn {
      position: fixed;
      top: 24px;
      right: 24px;
      background: #FF69B4;
      width: 54px;
      height: 54px;
      border-radius: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
      cursor: pointer;
      z-index: 1100;
      border: 2px solid #fff3c9;
      transition: 0.2s;
      background: linear-gradient(145deg, #FF8AAE, #FF6B9E);
    }

    .drawer-toggle-btn i {
      font-size: 2rem;
      color: white;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }

    .drawer-toggle-btn:hover {
      transform: scale(1.07);
      background: #ff4d85;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.85);
      z-index: 2000;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(8px);
    }

    .modal-content {
      max-width: 85vw;
      max-height: 85vh;
      animation: zoomIn 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.2);
    }

    .modal-content img {
      width: auto;
      max-width: 100%;
      max-height: 85vh;
      border-radius: 28px;
      box-shadow: 0 20px 35px black;
      border: 5px solid white;

    @keyframes zoomIn {
      from { transform: scale(0.7); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

      top: 25px;
      right: 35px;
      font-size: 3rem;
      color: white;
      cursor: pointer;
      background: rgba(0,0,0,0.6);

      height: 50px;

      align-items: center;
      justify-content: center;

      animation: heartbeat 1.2s infinite;
    }

    @keyframes heartbeat {

      50% { transform: scale(1.2);}
    }

    .footer-credit {
      margin-top: 1rem;
      font-size: 0.7rem;
      color: #f9e0c0;
      text-align: center;
    }

  function renderGallery() {
    const galleryDiv = document.getElementById('photoGallery');
    galleryDiv.innerHTML = '';
    photoUrls.forEach((url, idx) => {
      const img = document.createElement('img');
      img.src = url;
      img.classList.add('thumb-img');
      img.alt = `memory ${idx+1}`;
      img.loading = 'lazy';
      img.addEventListener('click', (e) => {
        e.stopPropagation();
        openModal(url);
      });
      galleryDiv.appendChild(img);
    });
  }

  const modal = document.getElementById('imageModal');
  const modalImg = document.getElementById('modalImage');
  const closeModalSpan = document.querySelector('.close-modal');

  function openModal(imgUrl) {
    modal.style.display = 'flex';
    modalImg.src = imgUrl;
  }

  function closeModal() {
    modal.style.display = 'none';
    modalImg.src = '';
  }

  closeModalSpan.addEventListener('click', closeModal);
  modal.addEventListener('click', (e) => {
    if (e.target === modal) closeModal();
  });

  const drawer = document.getElementById('loveDrawer');
  const openBtn = document.getElementById('openDrawerBtn');
  const closeDrawerBtn = document.getElementById('closeDrawerBtn');
  const closeDrawerBottomBtn = document.getElementById('closeDrawerBottomBtn');

  function openDrawer() { drawer.classList.add('open'); }
  function closeDrawer() { drawer.classList.remove('open'); }

  openBtn.addEventListener('click', openDrawer);
  closeDrawerBtn.addEventListener('click', closeDrawer);
  closeDrawerBottomBtn.addEventListener('click', closeDrawer);

  document.getElementById('loveTextContainer').innerText = loveLetter;

  // floating decorations
  const decorations = ['❤️', '🌸', '🍃', '🌿', '🌲', '🌳', '👼', '✨', '🍂', '💖', '🕊️', '🍁', '🌺', '⭐'];
  const decorContainer = document.getElementById('decorContainer');
  for (let i = 0; i < 55; i++) {
    const el = document.createElement('div');
    el.className = 'deco';
    const randomIcon = decorations[Math.floor(Math.random() * decorations.length)];
    el.innerHTML = randomIcon;
    const size = Math.floor(Math.random() * 28 + 16);
    el.style.fontSize = size + 'px';
    el.style.left = Math.random() * 100 + '%';
    el.style.top = Math.random() * 100 + '%';
    const duration = Math.random() * 20 + 10;
    el.style.animationDuration = duration + 's';
    el.style.animationDelay = Math.random() * 8 + 's';
    el.style.opacity = Math.random() * 0.3 + 0.12;
    decorContainer.appendChild(el);
  }

  document.body.addEventListener('click', (e) => {
    if (e.target.classList && e.target.classList.contains('thumb-img')) return;
    const heart = document.createElement('div');
    heart.innerHTML = '💗';
    heart.style.position = 'fixed';
    heart.style.left = e.clientX + 'px';
    heart.style.top = e.clientY + 'px';
    heart.style.fontSize = '1.6rem';
    heart.style.pointerEvents = 'none';
    heart.style.zIndex = '9999';
    heart.style.opacity = '0.8';
    heart.style.transition = 'transform 0.6s ease, opacity 0.8s';
    heart.style.transform = 'translateY(0px)';
    document.body.appendChild(heart);
    setTimeout(() => {
      heart.style.transform = 'translateY(-80px)';
      heart.style.opacity = '0';
    }, 10);
    setTimeout(() => heart.remove(), 900);
  });

  renderGallery();
</script>
</body>
</html>
