<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>✨ for you · love & music player ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      /* 📷 CHOOSE YOUR BACKGROUND OPTION BELOW: */
      /* Option A: Nice solid blue tint (Current) */
      background: linear-gradient(rgba(43, 59, 138, 0.6), rgba(43, 59, 138, 0.6)), #2B3B8A;
      
      /* Option B: To use her picture, upload "bg.jpg" to GitHub and uncomment the line below! */
      /* background-image: linear-gradient(rgba(43, 59, 138, 0.5), rgba(43, 59, 138, 0.5)), url("bg.jpg"); */
      
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      font-family: 'Quicksand', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      color: #1e1e2a;
    }

    /* 🔥 FIXED: Added explicit size, positioning adjustments, and absolute click protection */
    .deco {
      position: fixed;
      pointer-events: none !important;
      z-index: 0;
      opacity: 0.3;
      width: auto;
      height: auto;
      display: inline-block;
      user-select: none;
      animation: floatAround 18s infinite ease-in-out;
    }

    @keyframes floatAround {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-25px) rotate(8deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    .app-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      width: 100%;
      position: relative;
      z-index: 2;
    }

    /* 🔥 FIXED: Redesigned the container limits so it wraps perfectly and is fully clickable on phone & PC */
    .main-content {
      width: 100%;
      max-width: 500px;
      padding: 2rem 1.5rem;
      transition: all 0.3s ease;
      position: relative;
      z-index: 3;
    }

    .player-card {
      background: rgba(255, 245, 240, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 1.5rem;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.2);
      margin-bottom: 2rem;
    }

    .greeting {
      font-size: 1.7rem;
      font-weight: 700;
      background: linear-gradient(135deg, #FFE484, #FFB347, #FF69B4);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
      display: inline-block;
    }

    .sub-love {
      color: #FFD966;
      margin-bottom: 1.2rem;
      font-weight: 500;
      border-left: 4px solid #ff99cc;
      padding-left: 0.8rem;
      font-size: 0.9rem;
    }

    iframe {
      border-radius: 1.2rem;
      transition: all 0.2s;
      width: 100%;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    /* DRAWER LAYERING OVERHAUL */
    .drawer {
      position: fixed;
      top: 0;
      right: -420px;
      width: 400px;
      height: 100vh;
      background: rgba(255, 248, 245, 0.98);
      backdrop-filter: blur(12px);
      box-shadow: -8px 0 30px rgba(0, 0, 0, 0.4);
      z-index: 5000; /* Pushed way out in front */
      transition: right 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      border-left: 5px solid #FFB7C5;
      font-family: 'Quicksand', sans-serif;
      color: #2c2c2c;
    }

    .drawer.open {
      right: 0;
    }

    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 1.5rem;
      background: #ffecf0;
      border-bottom: 2px solid #ffb3c6;
      position: sticky;
      top: 0;
      z-index: 5100;
    }

    .drawer-header h3 {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(125deg, #D43F6B, #FF8C42);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .close-drawer {
      background: none;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      color: #bf4e6e;
      transition: transform 0.2s;
    }

    .close-drawer:hover {
      transform: rotate(90deg);
      color: #ff2e63;
    }

    .gallery-section {
      padding: 1rem 1.2rem;
    }

    .gallery-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #c44f6f;
      margin-bottom: 1rem;
      display: inline-block;
      border-bottom: 2px dashed #ffb3c6;
    }

    .photo-scatter {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 2rem;
    }

    .thumb-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 20px;
      box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
      cursor: pointer;
      transition: all 0.25s ease;
      border: 3px solid #fff7e8;
    }

    .thumb-img:hover {
      transform: scale(1.05) rotate(1deg);
      box-shadow: 0 12px 22px rgba(0, 0, 0, 0.3);
      border-color: #ffb347;
    }

    .love-message-box {
      background: rgba(255, 235, 215, 0.7);
      border-radius: 28px;
      padding: 1.2rem;
      margin: 0.8rem 1.2rem 1rem 1.2rem;
      border: 1px solid #ffbf91;
      box-shadow: inset 0 0 0 1px #fff9f0, 0 5px 12px rgba(0,0,0,0.05);
    }

    .love-text {
      font-size: 0.85rem;
      line-height: 1.55;
      font-weight: 500;
      color: #2b2a2f;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 45vh;
      overflow-y: auto;
      padding-right: 6px;
    }

    /* Custom scrollbars */
    .love-text::-webkit-scrollbar { width: 4px; }
    .love-text::-webkit-scrollbar-track { background: #ffcdb0; border-radius: 10px; }
    .love-text::-webkit-scrollbar-thumb { background: #ff8a5c; border-radius: 10px; }

    .close-drawer-btn-bottom {
      display: flex;
      justify-content: center;
      margin: 0.5rem 1.2rem 1.8rem 1.2rem;
    }

    .close-drawer-bottom {
      background: #ff99bb;
      border: none;
      padding: 0.7rem 1.5rem;
      border-radius: 40px;
      font-weight: bold;
      font-size: 0.9rem;
      color: #2d2a2e;
      cursor: pointer;
      transition: 0.2s;
      width: 100%;
      font-family: 'Quicksand', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 12px rgba(255,153,187,0.3);
    }

    .close-drawer-bottom:hover {
      background: #ff7aa8;
      color: white;
    }

    /* 🔥 FIXED: Upgraded z-index so the pink button stays clickable and safe above background decor */
    .drawer-toggle-btn {
      position: fixed;
      top: 24px;
      right: 24px;
      background: linear-gradient(145deg, #FF8AAE, #FF6B9E);
      width: 54px;
      height: 54px;
      border-radius: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 25px rgba(255,107,158,0.4);
      cursor: pointer;
      z-index: 4000;
      border: 2px solid #fff3c9;
      transition: 0.2s;
    }

    .drawer-toggle-btn i {
      font-size: 1.5rem;
      color: white;
    }

    .drawer-toggle-btn:hover {
      transform: scale(1.07);
      background: #ff4d85;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.85);
      z-index: 9000;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(8px);
    }

    .modal-content {
      max-width: 85vw;
      max-height: 85vh;
      animation: zoomIn 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.2);
    }

    .modal-content img {
      width: auto;
      max-width: 100%;
      max-height: 85vh;
      border-radius: 28px;
      box-shadow: 0 20px 35px black;
      border: 5px solid white;
    }

    @keyframes zoomIn {
      from { transform: scale(0.7); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .close-modal {
      position: absolute;
      top: 25px;
      right: 35px;
      font-size: 3rem;
      color: white;
      cursor: pointer;
      background: rgba(0,0,0,0.6);
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }

    @media (max-width: 780px) {
      .main-content {
        max-width: 100%;
        padding: 1rem;
      }
      .drawer {
        width: 85%;
        right: -90%;
      }
      .drawer.open {
        right: 0;
      }
    }

    .extra-note {
      background: #ffe2b5;
      border-radius: 40px;
      padding: 0.7rem 1rem;
      margin-top: 1.2rem;
      font-size: 0.75rem;
      text-align: center;
      color: #5a3e1b;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .heart-animation {
      display: inline-block;
      animation: heartbeat 1.2s infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1);}
      50% { transform: scale(1.2);}
    }

    .footer-credit {
      margin-top: 1rem;
      font-size: 0.75rem;
      color: #f9e0c0;
      text-align: center;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }
  </style>
</head>

</div>

<div id="imageModal" class="modal">
  <span class="close-modal">×</span>
  <div class="modal-content">
    <img id="modalImage" src="" alt="enlarged memory">
  </div>
</div>
