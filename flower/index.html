<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Giftbox</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background-color: #ffe3e8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            text-align: center;
            cursor: pointer;
        }

        /* The Gift Box Base */
        .gift-box {
            position: relative;
            width: 160px;
            height: 160px;
            background: #ff4a6b;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
        }

        /* Box Lid */
        .lid {
            position: absolute;
            width: 170px;
            height: 40px;
            background: #ff3356;
            top: -40px;
            left: -5px;
            border-radius: 5px 5px 0 0;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 3;
        }

        /* Ribbon Styles */
        .gift-box::before, .lid::before {
            content: '';
            position: absolute;
            background: #fff;
            width: 30px;
            height: 100%;
            left: 50%;
            transform: translateX(-50%);
        }
        .gift-box::after {
            content: '';
            position: absolute;
            background: #fff;
            width: 100%;
            height: 30px;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
        }

        /* The Flower (Hidden inside at start) */
        .flower {
            position: absolute;
            font-size: 80px;
            left: 50%;
            top: 40px;
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275), top 0.8s ease;
            z-index: 1;
            pointer-events: none;
        }

        /* Message Text */
        .message {
            margin-top: 30px;
            font-size: 1.5rem;
            color: #d63352;
            font-weight: bold;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        /* OPEN STATE ANIMATIONS (Triggered by click) */
        .container.open .lid {
            transform: translateY(-140px) rotate(-20deg);
        }

        .container.open .flower {
            transform: translate(-50%, -50%) scale(1.6) rotate(360deg);
            top: -110px; /* Pops out the top */
        }

        .container:hover .gift-box {
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="container" onclick="openBox()">
        <div class="flower">🌸</div>
        <div class="lid"></div>
        <div class="gift-box"></div>
        <div class="message" id="msg-text">Press me!</div>
    </div>

    <script>
        function openBox() {
            const container = document.querySelector('.container');
            const msgText = document.getElementById('msg-text');
            
            // Toggle the open class
            container.classList.toggle('open');
            
            // Update the text string instantly
            if (container.classList.contains('open')) {
                msgText.innerText = "Surprise! 🌸";
            } else {
                msgText.innerText = "Press me!";
            }
        }
    </script>
</body>
</html>
