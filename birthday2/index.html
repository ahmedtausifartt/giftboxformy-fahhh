<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🎂 Happy Birthday, My Love</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: #0a0e1a;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      position: relative;
      touch-action: manipulation;
    }
    .screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s ease, transform 0.6s ease;
      will-change: transform, opacity;
    }
    .screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.95);
    }

    /* WELCOME */
    #welcome {
      background: radial-gradient(circle at center, #1a1f33, #0a0e1a);
      z-index: 100;
    }
    #welcome .welcome-content {
      text-align: center;
      padding: 1rem;
      position: relative;
      z-index: 2;
    }
    .welcome-title {
      font-size: clamp(2.2rem, 10vw, 4.5rem);
      font-weight: 900;
      color: #ffd700;
      text-shadow: 0 0 20px #ffaa00, 0 0 40px #ff8800, 0 0 80px #ff5500;
      letter-spacing: 0.04em;
      font-family: 'Courier New', monospace;
      image-rendering: pixelated;
      line-height: 1.2;
      margin-bottom: 0.5rem;
      animation: pulseGlow 2s infinite alternate;
    }
    @keyframes pulseGlow {
      0% { text-shadow: 0 0 20px #ffaa00, 0 0 40px #ff8800; }
      100% { text-shadow: 0 0 40px #ffdd44, 0 0 80px #ffaa00, 0 0 120px #ff6600; }
    }
    .welcome-sub {
      font-size: clamp(0.9rem, 3vw, 1.4rem);
      color: rgba(255, 215, 0, 0.8);
      background: rgba(0,0,0,0.4);
      padding: 0.5rem 1.5rem;
      border-radius: 40px;
      display: inline-block;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 215, 0, 0.3);
      margin-top: 1rem;
      font-weight: 300;
      letter-spacing: 2px;
      animation: blink 1.5s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .balloon {
      position: absolute;
      border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
      width: 60px;
      height: 70px;
      animation: floatBalloon 6s infinite alternate ease-in-out;
      z-index: 1;
      box-shadow: inset -10px -10px 20px rgba(0,0,0,0.2);
    }
    .balloon::after {
      content: '';
      position: absolute;
      bottom: -30px;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 30px;
      background: rgba(255,255,255,0.3);
    }
    .balloon::before {
      content: '▼';
      position: absolute;
      bottom: -12px;
      left: 50%;
      transform: translateX(-50%) scale(0.5);
      color: rgba(255,255,255,0.5);
    }
    @keyframes floatBalloon {
      0% { transform: translateY(0px) rotate(-3deg); }
      100% { transform: translateY(-30px) rotate(3deg); }
    }

    /* GAME SCREEN - using dragon image as bg */
    #game {
      background: url('https://media.discordapp.net/attachments/1342752359658422323/1519784775550763028/image.png?ex=6a3f7a1e&is=6a3e289e&hm=3703fe3b89cc0ed607edf017186d7392ed2d93f3486f202e369d260c42697d6b&=&format=webp&quality=lossless&width=135&height=203') center/cover no-repeat;
      z-index: 10;
      overflow: hidden;
      position: relative;
    }
    #game::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.15);
      pointer-events: none;
      z-index: 1;
    }
    .game-content {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
    }

    /* GROUND OVERLAY */
    .ground-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 28%;
      background: linear-gradient(0deg, rgba(20,35,20,0.25) 0%, transparent 100%);
      pointer-events: none;
      z-index: 3;
    }

    /* EASTER EGG OBJECTS */
    .egg-object {
      position: absolute;
      cursor: pointer;
      pointer-events: auto;
      transition: transform 0.15s;
      z-index: 20;
    }
    .egg-object:active {
      transform: scale(0.92);
    }

    /* DRAGON - on the road */
    .dragon-road {
      width: 120px;
      height: 180px;
      background: url('https://media.discordapp.net/attachments/1342752359658422323/1519784775550763028/image.png?ex=6a3f7a1e&is=6a3e289e&hm=3703fe3b89cc0ed607edf017186d7392ed2d93f3486f202e369d260c42697d6b&=&format=webp&quality=lossless&width=135&height=203') center/contain no-repeat;
      filter: drop-shadow(0 0 15px rgba(255,200,100,0.12));
      animation: dragonIdle 3s infinite alternate ease-in-out;
      opacity: 0.92;
    }
    @keyframes dragonIdle {
      0% { transform: translateY(0px) rotate(0deg); }
      100% { transform: translateY(-6px) rotate(1deg); }
    }

    /* STAR - in the sky */
    .star-sky {
      width: 50px;
      height: 40px;
      background: url('https://media.discordapp.net/attachments/1342752359658422323/1520130711430889593/image.png?ex=6a40138c&is=6a3ec20c&hm=6012bbe5e68bc1af10742c40af4f034b7eadc52ab722ced343217a8564c0fb08&=&format=webp&quality=lossless&width=14&height=11') center/contain no-repeat;
      filter: drop-shadow(0 0 20px rgba(255,215,0,0.15));
      opacity: 0.9;
    }

    /* BUSH - bottom right */
    .bush-ground {
      width: 140px;
      height: 65px;
      background: url('https://media.discordapp.net/attachments/1342752359658422323/1520131058966728925/image.png?ex=6a4013df&is=6a3ec25f&hm=1bf396f1035c0e513cc2df75e51768c2441064c0dd2f8e1056b4ce9c3e181014&=&format=webp&quality=lossless&width=357&height=160') center/contain no-repeat;
      filter: drop-shadow(0 4px 15px rgba(0,0,0,0.3));
      transition: transform 0.2s;
    }
    .bush-ground:active {
      transform: scale(0.92);
    }
    .bush-shake {
      animation: bushShake 0.3s ease-out;
    }
    @keyframes bushShake {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(-4deg); }
      75% { transform: rotate(4deg); }
      100% { transform: rotate(0deg); }
    }

    /* ===== CAKE ===== */
    #cake-container {
      position: absolute;
      bottom: 14%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 15;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      pointer-events: auto;
    }
    .cake-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Candles on top of cake */
    .candles-container {
      display: flex;
      gap: 8px;
      position: absolute;
      top: -32px;
      left: 50%;
      transform: translateX(-50%);
      flex-wrap: wrap;
      justify-content: center;
      width: 70%;
      pointer-events: none;
      z-index: 5;
    }
    .candle {
      width: 14px;
      height: 28px;
      background: linear-gradient(180deg, #f5e8d0, #d4c4a8);
      border-radius: 3px 3px 2px 2px;
      position: relative;
      cursor: pointer;
      pointer-events: auto;
      transition: height 0.3s, opacity 0.3s;
      box-shadow: 0 3px 8px rgba(0,0,0,0.3);
      border: 1px solid rgba(200,180,160,0.2);
    }
    .candle .flame {
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%);
      width: 9px;
      height: 13px;
      background: radial-gradient(circle at 30% 20%, #ffdd44, #ff8800);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      animation: flicker 0.4s infinite alternate;
      filter: blur(0.5px);
      box-shadow: 0 0 16px #ff8800, 0 0 30px #ff5500;
      transition: all 0.3s;
    }
    @keyframes flicker {
      0% { transform: translateX(-50%) scale(1) rotate(-3deg); }
      100% { transform: translateX(-50%) scale(1.08) rotate(3deg); }
    }
    .candle .flame.extinct {
      opacity: 0;
      transform: scale(0);
      box-shadow: none;
    }
    .candle.extinct {
      height: 18px;
      opacity: 0.4;
      background: #b0a088;
    }
    .candle.extinct .flame {
      display: none;
    }

    /* Cake image */
    .cake-img {
      width: 160px;
      height: auto;
      aspect-ratio: 220/350;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      transition: transform 0.15s;
      display: block;
      background: transparent;
      image-rendering: auto;
    }
    .cake-img:active {
      transform: scale(0.96);
    }

    .cake-progress {
      position: absolute;
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 0.7rem;
      background: rgba(0,0,0,0.5);
      padding: 3px 14px;
      border-radius: 30px;
      backdrop-filter: blur(4px);
      white-space: nowrap;
      display: none;
      border: 1px solid rgba(255,255,255,0.06);
      z-index: 10;
    }
    .cake-progress.show {
      display: block;
    }

    /* DECORATIVE CLOUDS */
    .cloud-deco {
      position: absolute;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 120px;
      filter: blur(4px);
      pointer-events: none;
      animation: cloudDrift 25s infinite alternate ease-in-out;
      z-index: 2;
    }
    .cloud-deco:nth-child(2) { animation-duration: 30s; animation-delay: 3s; }
    .cloud-deco:nth-child(3) { animation-duration: 20s; animation-delay: 6s; }
    .cloud-deco:nth-child(4) { animation-duration: 35s; animation-delay: 0s; }
    @keyframes cloudDrift {
      0% { transform: translateX(0px) scale(1); }
      100% { transform: translateX(80px) scale(1.05); }
    }

    /* SPECIAL CLOUD (easter egg) - blends in */
    .cloud-normal {
      position: absolute;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 120px;
      filter: blur(3px);
      cursor: pointer;
      pointer-events: auto;
      z-index: 20;
      transition: transform 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      color: rgba(255,255,255,0.04);
      animation: cloudFloat 6s infinite alternate ease-in-out;
    }
    .cloud-normal:active {
      transform: scale(0.94);
    }
    .cloud-normal .cloud-label {
      position: absolute;
      bottom: -26px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.3);
      color: rgba(255,255,255,0.3);
      font-size: 0.45rem;
      padding: 1px 8px;
      border-radius: 10px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      backdrop-filter: blur(2px);
    }
    .cloud-normal:hover .cloud-label {
      opacity: 1;
    }
    @keyframes cloudFloat {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-6px); }
    }

    /* DECORATIVE STARS */
    .star-deco {
      position: absolute;
      width: 10px;
      height: 10px;
      background: rgba(255, 255, 255, 0.07);
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      animation: twinkleDeco 3s infinite alternate;
      pointer-events: none;
      z-index: 2;
    }
    @keyframes twinkleDeco {
      0% { opacity: 0.06; transform: scale(0.6); }
      100% { opacity: 0.35; transform: scale(1.1); }
    }

    /* POEM POPUP */
    .poem-popup {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      background: rgba(20, 15, 40, 0.94);
      backdrop-filter: blur(16px);
      border: 2px solid rgba(255, 215, 0, 0.5);
      border-radius: 30px;
      padding: 2rem 1.8rem;
      max-width: 92%;
      width: 400px;
      max-height: 80vh;
      overflow-y: auto;
      z-index: 200;
      box-shadow: 0 40px 80px rgba(0,0,0,0.8);
      color: #f0e8d0;
      display: none;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-align: center;
      pointer-events: auto;
    }
    .poem-popup.show {
      display: block;
      transform: translate(-50%, -50%) scale(1);
    }
    .poem-popup .poem-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #ffd700;
      margin-bottom: 1rem;
      border-bottom: 1px solid rgba(255,215,0,0.2);
      padding-bottom: 0.5rem;
    }
    .poem-popup .poem-text {
      font-size: 0.95rem;
      line-height: 1.7;
      white-space: pre-wrap;
      font-family: 'Georgia', serif;
      text-align: left;
      margin: 0.5rem 0 1.5rem;
      max-height: 50vh;
      overflow-y: auto;
      padding: 0 0.5rem;
    }
    .poem-popup .close-poem {
      background: #ffd700;
      border: none;
      color: #1a1a2e;
      padding: 10px 32px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      pointer-events: auto;
    }
    .poem-popup .close-poem:active {
      transform: scale(0.94);
    }

    /* BOOK MODAL */
    .book-modal {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      z-index: 300;
      display: none;
      justify-content: center;
      align-items: center;
      pointer-events: auto;
    }
    .book-modal.show {
      display: flex;
    }
    .book {
      background: #f9f0e0;
      border-radius: 24px;
      width: 92%;
      max-width: 520px;
      max-height: 88vh;
      padding: 1.5rem 1.2rem 1.2rem;
      box-shadow: 0 40px 80px rgba(0,0,0,0.9);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 4px solid #d4b48c;
    }
    .book-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 0.8rem;
      border-bottom: 2px dashed #d4b48c;
      margin-bottom: 0.8rem;
      font-family: 'Georgia', serif;
      color: #6b4a2c;
    }
    .book-header .page-num {
      font-size: 0.9rem;
      background: #e8d5c0;
      padding: 2px 14px;
      border-radius: 20px;
    }
    .book-body {
      flex: 1;
      overflow-y: auto;
      padding: 0.2rem 0.4rem;
      font-family: 'Georgia', serif;
      color: #3d2b1f;
      font-size: 0.95rem;
      line-height: 1.7;
      max-height: 58vh;
      scroll-behavior: smooth;
    }
    .book-body p {
      margin-bottom: 0.8rem;
      text-indent: 1.8rem;
    }
    .book-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.8rem;
      padding-top: 0.8rem;
      border-top: 1px solid #d4b48c;
    }
    .book-footer button {
      background: #d4b48c;
      border: none;
      padding: 8px 20px;
      border-radius: 30px;
      font-weight: 600;
      color: #2d1f14;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      pointer-events: auto;
    }
    .book-footer button:active {
      transform: scale(0.94);
      background: #c4a07a;
    }
    .book-footer button:disabled {
      opacity: 0.4;
      pointer-events: none;
    }
    .book-close {
      background: transparent !important;
      color: #8b6b4a !important;
      font-size: 1.2rem !important;
      padding: 0 12px !important;
      box-shadow: none !important;
    }

    @media (max-width: 480px) {
      .dragon-road { width: 80px; height: 120px; }
      .star-sky { width: 35px; height: 28px; }
      .bush-ground { width: 100px; height: 46px; }
      .cake-img { width: 120px; }
      .candle { width: 11px; height: 22px; }
      .candle .flame { width: 7px; height: 10px; top: -11px; }
      .candles-container { gap: 5px; top: -26px; }
      .poem-popup { padding: 1.5rem 1rem; width: 94%; }
      .book { padding: 1rem; }
      .cloud-normal { width: 100px !important; height: 35px !important; font-size: 1.2rem; }
    }
    @media (max-width: 380px) {
      .dragon-road { width: 65px; height: 98px; }
      .star-sky { width: 28px; height: 22px; }
      .bush-ground { width: 80px; height: 37px; }
      .cake-img { width: 100px; }
      .candle { width: 9px; height: 18px; }
      .candle .flame { width: 6px; height: 8px; top: -9px; }
      .candles-container { gap: 3px; top: -22px; }
    }
  </style>
</head>
<body>

<!-- WELCOME -->
<div id="welcome" class="screen">
  <div class="welcome-content">
    <div class="welcome-title">HAPPY BIRTHDAY<br>MY BELOVED<br>GIRLFRIEND</div>
    <div class="welcome-sub">🖱️ click anywhere to continue</div>
  </div>
  <div id="balloons-container"></div>
</div>

<!-- GAME -->
<div id="game" class="screen hidden">
  <div class="game-content">
    <!-- Ground overlay -->
    <div class="ground-overlay"></div>

    <!-- Decorative clouds -->
    <div class="cloud-deco" style="width:160px;height:50px;top:8%;left:5%;"></div>
    <div class="cloud-deco" style="width:200px;height:55px;top:15%;right:15%;"></div>
    <div class="cloud-deco" style="width:120px;height:38px;top:28%;left:3%;"></div>
    <div class="cloud-deco" style="width:180px;height:50px;bottom:32%;right:6%;"></div>

    <!-- SPECIAL CLOUD (easter egg) -->
    <div id="cloud-egg" class="cloud-normal" style="width:140px;height:45px;top:5%;left:40%;">
      ☁️
      <span class="cloud-label">✨</span>
    </div>

    <!-- Decorative stars (non-clickable) -->
    <div class="star-deco" style="top:10%;left:18%;"></div>
    <div class="star-deco" style="top:22%;left:80%;animation-delay:1.5s;"></div>
    <div class="star-deco" style="top:32%;left:10%;animation-delay:0.8s;"></div>
    <div class="star-deco" style="top:6%;right:30%;animation-delay:2s;"></div>
    <div class="star-deco" style="top:40%;right:12%;animation-delay:1.2s;"></div>

    <!-- ===== EASTER EGGS ===== -->

    <!-- 1. DRAGON - on the road -->
    <div id="dragon-egg" class="egg-object" style="bottom:22%;left:12%;z-index:18;">
      <div class="dragon-road"></div>
    </div>

    <!-- 2. STAR - in the sky -->
    <div id="star-egg" class="egg-object" style="top:8%;left:52%;z-index:18;">
      <div class="star-sky"></div>
    </div>

    <!-- 3. BUSH - bottom right -->
    <div id="bush-egg" class="egg-object" style="bottom:10%;right:8%;z-index:19;">
      <div class="bush-ground" id="bush-visual"></div>
    </div>

    <!-- ===== CAKE ===== -->
    <div id="cake-container">
      <div class="cake-wrapper">
        <div class="candles-container" id="candles-container"></div>
        <img src="https://media.discordapp.net/attachments/1342752359658422323/1519788552832160008/image.png?ex=6a3f7da3&is=6a3e2c23&hm=7acf15f3db73124c30dd5c43aa47072a05ad3d5df85b6d3826e5340d2bd19609&=&format=webp&quality=lossless&width=220&height=350" alt="Birthday Cake" class="cake-img" id="cake-img" />
        <div class="cake-progress" id="cake-progress">🍰 eat cake (0/10)</div>
      </div>
    </div>

    <!-- POEM POPUP -->
    <div id="poem-popup" class="poem-popup">
      <div class="poem-title" id="poem-title">✨ Poem</div>
      <div class="poem-text" id="poem-text"></div>
      <button class="close-poem" id="close-poem">💖 close</button>
    </div>

    <!-- BOOK MODAL -->
    <div id="book-modal" class="book-modal">
      <div class="book">
        <div class="book-header">
          <span>📖 My Diary</span>
          <span class="page-num" id="page-num">1 / 1</span>
        </div>
        <div class="book-body" id="book-body"></div>
        <div class="book-footer">
          <button id="book-prev" disabled>◀ prev</button>
          <button id="book-close" class="book-close">✕ close</button>
          <button id="book-next">next ▶</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // ====================================================================
  //  DATA — Poems (same as before)
  // ====================================================================
  const poems = {
    dragon: `"POROOOOO PLSSS FOR THE SAKE OF US

  function initGame() {
    createCandles();
    setupEasterEggs();
    setupCake();
    setupBook();
  }

  // ---- CANDLES ----
  function createCandles() {
    const count = 18;
    for (let i = 0; i < count; i++) {
      const candle = document.createElement('div');
      candle.className = 'candle';
      candle.dataset.index = i;
      const flame = document.createElement('div');
      flame.className = 'flame';
      candle.appendChild(flame);
      candle.addEventListener('click', (e) => {
        e.stopPropagation();
        blowCandle(candle);
      });
      candlesContainer.appendChild(candle);
    }
    state.candlesLit = count;
  }

  function blowCandle(candle) {
    if (candle.classList.contains('extinct')) return;
    candle.classList.add('extinct');
    candle.querySelector('.flame').classList.add('extinct');
    state.candlesLit--;
    playBlowSound();
    createSparkles(candle);
    if (state.candlesLit === 0) {
      state.cakeEatEnabled = true;
      cakeProgress.classList.add('show');
      cakeProgress.textContent = '🎂 now eat the cake! (tap)';
      setTimeout(() => {
        showPoem('🎉', 'You blew all the candles! Now eat the cake to find your treasure 🍰');
      }, 500);
    }
  }

  function playBlowSound() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(600, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.07, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.15);
    } catch(e) {}
  }

  function createSparkles(el) {
    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    for (let i = 0; i < 14; i++) {
      const spark = document.createElement('div');
      spark.style.cssText = `position:fixed;width:5px;height:5px;background:hsl(${Math.random()*60+20},100%,70%);border-radius:50%;pointer-events:none;left:${cx}px;top:${cy}px;z-index:999;transition:all 0.6s ease-out;`;
      const angle = Math.random() * 2 * Math.PI;
      const dist = 35 + Math.random() * 65;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist - 25;
      document.body.appendChild(spark);
      requestAnimationFrame(() => {
        spark.style.transform = `translate(${dx}px, ${dy}px) scale(0)`;
        spark.style.opacity = '0';
      });
      setTimeout(() => spark.remove(), 700);
    }
  }

  // ---- CAKE ----
  function setupCake() {
    cakeImg.addEventListener('click', (e) => {
      if (!state.cakeEatEnabled || state.treasureFound) return;
      state.cakeClicks++;
      const max = 10;
      const progress = Math.min(state.cakeClicks, max);
      cakeProgress.textContent = `🍰 eating... (${progress}/${max})`;
      cakeImg.style.transform = 'scale(0.94)';
      setTimeout(() => cakeImg.style.transform = '', 150);
      if (progress === 9) {
        showPoem('🎁', 'You\'ve found a hidden treasure that was in the cake! 📖');
        closePoemBtn.onclick = () => {
          hidePoem();
          showBook();
        };
        state.treasureFound = true;
        cakeProgress.textContent = '🎉 treasure found! open the diary!';
      } else if (progress >= max) {
        cakeProgress.textContent = '🍰 cake finished!';
        state.cakeEatEnabled = false;
      }
    });
  }

  function handleEggClick(eggKey, title, poem) {
    if (!state.eggClicks[eggKey]) state.eggClicks[eggKey] = 0;
    state.eggClicks[eggKey]++;

    if (state.eggClicks[eggKey] === 1) {
      showPoem('❓', 'Hmm... what could this be? Tap again to find out!');
      return;
    }

    if (state.eggClicks[eggKey] >= 2) {
      showPoem(title, poem);
      state.eggClicks[eggKey] = 0;
    }
  }

  // ---- POEM POPUP ----

  function setupBook() {
    const paragraphs = diaryText.split(/\n\s*\n/).filter(p => p.trim().length > 0);
    const pages = [];
    for (let i = 0; i < paragraphs.length; i += 2) {
      pages.push(paragraphs.slice(i, i+2).join('\n\n'));
    }
    state.bookPages = pages;
    state.currentPage = 0;

    bookPrev.addEventListener('click', () => {
      if (state.currentPage > 0) {
        state.currentPage--;
        renderBookPage();
        playPageSound();
      }
    });
    bookNext.addEventListener('click', () => {
      if (state.currentPage < state.bookPages.length - 1) {
        state.currentPage++;
        renderBookPage();
        playPageSound();
      }
    });
    bookClose.addEventListener('click', () => bookModal.classList.remove('show'));
    bookModal.addEventListener('click', (e) => {
      if (e.target === bookModal) bookModal.classList.remove('show');
    });
  }

  function showBook() {
    bookModal.classList.add('show');
    state.currentPage = 0;
    renderBookPage();
    playPageSound();
  }

  function renderBookPage() {
    const pages = state.bookPages;
    if (!pages.length) return;
    const content = pages[state.currentPage] || '';
    const lines = content.split('\n').filter(line => line.trim() !== '');
    bookBody.innerHTML = lines.map(line => `<p>${line.trim()}</p>`).join('');
    pageNum.textContent = `${state.currentPage+1} / ${pages.length}`;
    bookPrev.disabled = (state.currentPage === 0);
    bookNext.disabled = (state.currentPage === pages.length - 1);
    bookBody.scrollTop = 0;
  }

  function playPageSound() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(350, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.04, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.1);
    } catch(e) {}
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      hidePoem();
      bookModal.classList.remove('show');
    }
  });

  console.log('🎂 Happy Birthday, my love!');
</script>
</body>
</html>
