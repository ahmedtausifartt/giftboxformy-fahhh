<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Two-Player Ludo</title>
    <style>
        :root {
            --green: #2ecc71; --yellow: #f1c40f; --red: #e74c3c; --blue: #3498db;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #2c3e50; color: white; display: flex;
            flex-direction: column; align-items: center; margin: 0; padding: 20px;
        }
        h1 { margin: 5px 0; font-size: 24px; }
        #setup, #game-container {
            background: #34495e; padding: 20px; border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center;
        }
        #game-container { display: none; margin-top: 10px; }
        .btn {
            background: #e67e22; border: none; padding: 10px 20px;
            color: white; font-size: 16px; border-radius: 5px; cursor: pointer; margin: 5px;
        }
        .btn:hover { background: #d35400; }
        #status { font-size: 18px; margin: 10px 0; font-weight: bold; min-height: 27px;}
        
        /* Simplified Ludo Board Grid */
        #board {
            display: grid; grid-template-columns: repeat(15, 30px);
            grid-template-rows: repeat(15, 30px); gap: 1px;
            background: #7f8c8d; border: 5px solid #fff; margin: 10px auto;
            width: 464px; height: 464px;
        }
        .cell { background: white; display: flex; justify-content: center; align-items: center; position: relative; }
        
        /* Home Bases */
        .red-home { grid-column: 1 / 7; grid-row: 10 / 16; background: var(--red); }
        .green-home { grid-column: 1 / 7; grid-row: 1 / 7; background: var(--green); }
        .yellow-home { grid-column: 10 / 16; grid-row: 1 / 7; background: var(--yellow); }
        .blue-home { grid-column: 10 / 16; grid-row: 10 / 16; background: var(--blue); }
        
        /* Center Goal */
        .center-home { grid-column: 7 / 10; grid-row: 7 / 10; background: #ecf0f1; font-weight: bold; font-size: 12px;}
        
        /* Paths colored to match traditional track highlights */
        .g-path { background: #a3e4d7; }
        .y-path { background: #f9e79f; }
        .b-path { background: #aed6f1; }
        .r-path { background: #f9e79f; } /* Using simplified shared tracks for presentation */
        .home-lane-red { background: var(--red); }
        .home-lane-yellow { background: var(--yellow); }

        /* Tokens */
        .token {
            width: 22px; height: 22px; border-radius: 50%;
            border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            cursor: pointer; position: absolute; z-index: 10;
            transition: all 0.2s ease;
        }
        .token.red { background: var(--red); }
        .token.yellow { background: var(--yellow); }
        .token.playable { animation: bounce 0.5s infinite alternate; box-shadow: 0 0 10px #fff; }
        
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-4px); } }
        #dice-area { margin: 15px 0; display: flex; justify-content: center; align-items: center; gap: 15px; }
        #dice-view {
            width: 45px; height: 45px; background: white; color: black;
            border-radius: 8px; display: flex; justify-content: center;
            align-items: center; font-size: 24px; font-weight: bold; box-shadow: 0 3px 6px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <h1>🏆 Real-Time Ludo (2 Players) 🏆</h1>
    
    <div id="setup">
        <p>Enter a Room Name to play with a friend:</p>
        <input type="text" id="room-input" placeholder="e.g., epic-battle" style="padding: 10px; font-size: 16px; border-radius: 5px; border: none; width: 200px;"><br><br>
        <button class="btn" onclick="joinRoom('Red')">Join as RED (Player 1)</button>
        <button class="btn" onclick="joinRoom('Yellow')">Join as YELLOW (Player 2)</button>
    </div>

    <div id="game-container">
        <h3 id="room-display">Room: Unique</h3>
        <div id="status">Waiting for players...</div>
        
        <div id="dice-area">
            <button id="roll-btn" class="btn" onclick="rollDice()">Roll Dice</button>
            <div id="dice-view">-</div>
        </div>

        <div id="board">
            <div class="green-home"></div>
            <div class="cell" id="c-0-6"></div><div class="cell y-path" id="c-0-7"></div><div class="cell" id="c-0-8"></div>
            <div class="cell" id="c-1-6"></div><div class="cell home-lane-yellow" id="c-1-7"></div><div class="cell" id="c-1-8"></div>
            <div class="cell" id="c-2-6"></div><div class="cell home-lane-yellow" id="c-2-7"></div><div class="cell" id="c-2-8"></div>
            <div class="cell" id="c-3-6"></div><div class="cell home-lane-yellow" id="c-3-7"></div><div class="cell" id="c-3-8"></div>
            <div class="cell" id="c-4-6"></div><div class="cell home-lane-yellow" id="c-4-7"></div><div class="cell" id="c-4-8"></div>
            <div class="cell" id="c-5-6"></div><div class="cell home-lane-yellow" id="c-5-7"></div><div class="cell" id="c-5-8"></div>
            <div class="yellow-home"></div>

            <div class="cell" id="c-6-0"></div><div class="cell" id="c-6-1"></div><div class="cell" id="c-6-2"></div><div class="cell" id="c-6-3"></div><div class="cell" id="c-6-4"></div><div class="cell" id="c-6-5"></div>
            <div class="center-home">HOME</div>
            <div class="cell" id="c-6-9"></div><div class="cell" id="c-6-10"></div><div class="cell" id="c-6-11"></div><div class="cell" id="c-6-12"></div><div class="cell" id="c-6-13"></div><div class="cell" id="c-6-14"></div>
            
            <div class="cell" id="c-7-0"></div>
            <div class="cell home-lane-red" id="c-7-1"></div><div class="cell home-lane-red" id="c-7-2"></div><div class="cell home-lane-red" id="c-7-3"></div><div class="cell home-lane-red" id="c-7-4"></div><div class="cell home-lane-red" id="c-7-5"></div>
            <div class="cell" id="c-7-9"></div><div class="cell" id="c-7-10"></div><div class="cell" id="c-7-11"></div><div class="cell" id="c-7-12"></div><div class="cell" id="c-7-13"></div><div class="cell" id="c-7-14"></div>
            
            <div class="cell" id="c-8-0"></div><div class="cell" id="c-8-1"></div><div class="cell" id="c-8-2"></div><div class="cell" id="c-8-3"></div><div class="cell" id="c-8-4"></div><div class="cell" id="c-8-5"></div>
            <div class="cell" id="c-8-9"></div><div class="cell" id="c-8-10"></div><div class="cell" id="c-8-11"></div><div class="cell" id="c-8-12"></div><div class="cell" id="c-8-13"></div><div class="cell" id="c-8-14"></div>

            <div class="red-home"></div>
            <div class="cell" id="c-9-6"></div><div class="cell" id="c-9-7"></div><div class="cell" id="c-9-8"></div>
            <div class="cell" id="c-10-6"></div><div class="cell" id="c-10-7"></div><div class="cell" id="c-10-8"></div>
            <div class="cell" id="c-11-6"></div><div class="cell" id="c-11-7"></div><div class="cell" id="c-11-8"></div>
            <div class="cell" id="c-12-6"></div><div class="cell" id="c-12-7"></div><div class="cell" id="c-12-8"></div>
            <div class="cell" id="c-13-6"></div><div class="cell" id="c-13-7"></div><div class="cell" id="c-13-8"></div>
            <div class="cell" id="c-14-6"></div><div class="cell" id="c-14-7"></div><div class="cell" id="c-14-8"></div>
            <div class="blue-home"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // --- 1. FIREBASE CONFIGURATION ---
        // Replace the placeholder values below with your real Firebase Project credentials.
        const firebaseConfig = {
            apiKey: "YOUR_FIREBASE_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // --- 2. GAME VARIABLES & PATHS ---
        let roomName = "";
        let playerColor = ""; // 'Red' or 'Yellow'
        let gameState = {};

        // Track path mapping coordinates for both players
        const redPath = [
            "c-6-1", "c-6-2", "c-6-3", "c-6-4", "c-6-5",
            "c-5-6", "c-4-6", "c-3-6", "c-2-6", "c-1-6", "c-0-6", "c-0-7", "c-0-8",
            "c-1-8", "c-2-8", "c-3-8", "c-4-8", "c-5-8",
            "c-6-9", "c-6-10", "c-6-11", "c-6-12", "c-6-13", "c-6-14", "c-7-14", "c-8-14",
            "c-8-13", "c-8-12", "c-8-11", "c-8-10", "c-8-9",
            "c-9-8", "c-10-8", "c-11-8", "c-12-8", "c-13-8", "c-14-8", "c-14-7", "c-14-6",
            "c-13-6", "c-12-6", "c-11-6", "c-10-6", "c-9-6",
            "c-8-5", "c-8-4", "c-8-3", "c-8-2", "c-8-1", "c-8-0", "c-7-0",
            "c-7-1", "c-7-2", "c-7-3", "c-7-4", "c-7-5", "HOME"
        ];

        const yellowPath = [
            "c-1-8", "c-2-8", "c-3-8", "c-4-8", "c-5-8",
            "c-6-9", "c-6-10", "c-6-11", "c-6-12", "c-6-13", "c-6-14", "c-7-14", "c-8-14",
            "c-8-13", "c-8-12", "c-8-11", "c-8-10", "c-8-9",
            "c-9-8", "c-10-8", "c-11-8", "c-12-8", "c-13-8", "c-14-8", "c-14-7", "c-14-6",
            "c-13-6", "c-12-6", "c-11-6", "c-10-6", "c-9-6",
            "c-8-5", "c-8-4", "c-8-3", "c-8-2", "c-8-1", "c-8-0", "c-7-0", "c-6-0",
            "c-6-1", "c-6-2", "c-6-3", "c-6-4", "c-6-5",
            "c-5-6", "c-4-6", "c-3-6", "c-2-6", "c-1-6", "c-0-6", "c-0-7",
            "c-1-7", "c-2-7", "c-3-7", "c-4-7", "c-5-7", "HOME"
        ];

        // --- 3. JOINING ROOM ---
        function joinRoom(color) {
            const input = document.getElementById('room-input').value.trim();
            if (!input) { alert("Please type a room name first!"); return; }
            
            roomName = input;
            playerColor = color;
            
            document.getElementById('setup').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('room-display').innerText = `Room: ${roomName} | You Are: ${color.toUpperCase()}`;

            // Sync with Firebase node matching the room name
            database.ref('rooms/' + roomName).on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    // Initialize new room data if it doesn't exist
                    initializeRoom();
                } else {
                    gameState = data;
                    renderGame();
                }
            });
        }

        function initializeRoom() {
            const initialData = {
                turn: "Red",
                diceValue: "-",
                hasRolled: false,
                redPos: -1,     // -1 means inside Home Base Yard
                yellowPos: -1   // -1 means inside Home Base Yard
            };
            database.ref('rooms/' + roomName).set(initialData);
        }

        // --- 4. GAME RENDERING ---
        function renderGame() {
            // Remove any old tokens from the screen
            document.querySelectorAll('.token').forEach(el => el.remove());
            
            // Render Status info
            const statusEl = document.getElementById('status');
            document.getElementById('dice-view').innerText = gameState.diceValue;

            if (gameState.winner) {
                statusEl.innerText = `🎉 ${gameState.winner} Wins the Game!`;
                document.getElementById('roll-btn').disabled = true;
                return;
            }

            statusEl.innerText = `${gameState.turn}'s Turn`;
            
            // Manage dice rolling permissions
            const isMyTurn = (gameState.turn === playerColor);
            document.getElementById('roll-btn').disabled = !(isMyTurn && !gameState.hasRolled);

            // Render Red Token
            let redToken = createTokenElement('red', 'Red');
            if (gameState.redPos === -1) {
                document.querySelector('.red-home').appendChild(redToken);
            } else if (gameState.redPos === "HOME") {
                document.querySelector('.center-home').appendChild(redToken);
            } else {
                document.getElementById(redPath[gameState.redPos]).appendChild(redToken);
            }

            // Render Yellow Token
            let yellowToken = createTokenElement('yellow', 'Yellow');
            if (gameState.yellowPos === -1) {
                document.querySelector('.yellow-home').appendChild(yellowToken);
            } else if (gameState.yellowPos === "HOME") {
                document.querySelector('.center-home').appendChild(yellowToken);
            } else {
                document.getElementById(yellowPath[gameState.yellowPos]).appendChild(yellowToken);
            }

            // Add bouncing animations to moveable tokens
            if (isMyTurn && gameState.hasRolled) {
                let rolledVal = parseInt(gameState.diceValue);
                if (playerColor === 'Red') {
                    if (canMove('Red', gameState.redPos, rolledVal)) redToken.classList.add('playable');
                } else {
                    if (canMove('Yellow', gameState.yellowPos, rolledVal)) yellowToken.classList.add('playable');
                }
            }
        }

        function createTokenElement(className, colorName) {
            let token = document.createElement('div');
            token.className = `token ${className}`;
            token.onclick = () => handleTokenClick(colorName);
            return token;
        }

        // --- 5. GAME ACTIONS ---
        function rollDice() {
            let rolled = Math.floor(Math.random() * 6) + 1;
            
            let updates = {
                diceValue: rolled,
                hasRolled: true
            };

            // Fast-forward Turn auto-switch if player rolled and can't make a move
            let currentPos = (playerColor === 'Red') ? gameState.redPos : gameState.yellowPos;
            if (!canMove(playerColor, currentPos, rolled)) {
                updates.turn = (playerColor === 'Red') ? 'Yellow' : 'Red';
                updates.hasRolled = false;
                alert(`Rolled a ${rolled}! No legal moves available. Turn passes.`);
            }

            database.ref('rooms/' + roomName).update(updates);
        }

        function canMove(color, currentPos, roll) {
            if (currentPos === -1 && roll !== 6) return false; // Needs a 6 to deploy
            if (currentPos === "HOME") return false;
            
            let pathLength = (color === 'Red') ? redPath.length : yellowPath.length;
            if (currentPos !== -1 && (currentPos + roll) >= pathLength) return false; // Oversal rule
            
            return true;
        }

        function handleTokenClick(clickedColor) {
            if (clickedColor !== playerColor || !gameState.hasRolled || gameState.turn !== playerColor) return;
            
            let roll = parseInt(gameState.diceValue);
            let currentPos = (playerColor === 'Red') ? gameState.redPos : gameState.yellowPos;
            
            if (!canMove(playerColor, currentPos, roll)) return;

            let nextPos;
            if (currentPos === -1 && roll === 6) {
                nextPos = 0; // Exit home onto index 0
            } else {
                nextPos = currentPos + roll;
            }

            let updates = {};
            let pathArray = (playerColor === 'Red') ? redPath : yellowPath;
            
            // Check if final tile destination reached
            if (pathArray[nextPos] === "HOME") {
                updates[playerColor === 'Red' ? 'redPos' : 'yellowPos'] = "HOME";
                updates.winner = playerColor; // Sets Victory
            } else {
                updates[playerColor === 'Red' ? 'redPos' : 'yellowPos'] = nextPos;
                
                // --- CAPTURING MECHANIC ---
                let destinationId = pathArray[nextPos];
                if (playerColor === 'Red' && gameState.yellowPos !== -1 && yellowPath[gameState.yellowPos] === destinationId) {
                    updates.yellowPos = -1; // Send Yellow back to base yard
                    alert("💥 Red captured Yellow!");
                } else if (playerColor === 'Yellow' && gameState.redPos !== -1 && redPath[gameState.redPos] === destinationId) {
                    updates.redPos = -1; // Send Red back to base yard
                    alert("💥 Yellow captured Red!");
                }
            }

            // Clean state & hand over active turn designation
            updates.hasRolled = false;
            updates.turn = (playerColor === 'Red') ? 'Yellow' : 'Red';
            
            database.ref('rooms/' + roomName).update(updates);
        }
    </script>
</body>
</html>
