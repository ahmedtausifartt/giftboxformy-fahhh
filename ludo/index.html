<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ludo Royale - Two Player (RED vs GREEN)</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #1e3c2c 0%, #0a2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .game-wrapper {
            background: #d9a066;
            border-radius: 56px;
            padding: 20px 24px 24px 24px;
            box-shadow: 0 25px 35px rgba(0, 0, 0, 0.5), inset 0 1px 4px rgba(255, 245, 200, 0.8);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 32px;
            box-shadow: 0 12px 28px black;
            cursor: pointer;
            background-color: #f7e9c3;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .turn-card {
            background: #2a1e14;
            padding: 6px 24px;
            border-radius: 60px;
            color: #ffdf8c;
            font-weight: bold;
            font-size: 1.3rem;
            box-shadow: inset 0 -2px 0 #6b4c2c, 0 6px 12px black;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .turn-led {
            width: 36px;
            height: 36px;
            border-radius: 36px;
            background: gray;
            box-shadow: 0 0 0 2px #ffd966;
        }

        .dice-panel {
            background: #fef0cf;
            border-radius: 48px;
            padding: 6px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: inset 0 0 0 2px #fff6e0, 0 7px 0 #9b5e2c;
        }

        .dice {
            width: 72px;
            height: 72px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.3rem;
            font-weight: 800;
            font-family: monospace;
            box-shadow: inset 0 -2px 0 #bbb, 0 5px 12px black;
            background: #fff6e8;
        }

        button {
            background: #ffaa44;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 8px 28px;
            border-radius: 60px;
            color: #2d2418;
            cursor: pointer;
            transition: 0.07s linear;
            box-shadow: 0 5px 0 #b45f1b;
            font-family: inherit;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #b45f1b;
        }

        .msg-area {
            background: #1f2a18;
            padding: 6px 20px;
            border-radius: 40px;
            color: #ffeaac;
            font-weight: 600;
            font-size: 0.9rem;
            max-width: 210px;
            text-align: center;
        }

        @media (max-width: 680px) {
            .game-wrapper { padding: 12px 16px 18px; }
            .dice { width: 55px; height: 55px; font-size: 2.2rem; }
            .turn-card { font-size: 1rem; padding: 4px 18px; }
            button { padding: 6px 20px; font-size: 1rem; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-wrapper">
        <canvas id="ludoCanvas" width="750" height="750"></canvas>
        <div class="controls">
            <div class="turn-card">
                <div class="turn-led" id="turnLed"></div>
                <span id="turnText">RED's Turn</span>
            </div>
            <div class="dice-panel">
                <div class="dice" id="diceValue">⚀</div>
                <button id="rollBtn">🎲 ROLL</button>
            </div>
            <div class="msg-area" id="gameMsg">Roll to begin!</div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ------------------- TWO-PLAYER LUDO (CLASSIC RULES) -------------------
        const canvas = document.getElementById('ludoCanvas');
        const ctx = canvas.getContext('2d');

        // Game state
        let currentPlayer = 'RED';      // RED starts
        let diceValue = 0;
        let diceRolled = false;
        let extraTurn = false;
        let consecutiveSixes = 0;
        let gameWinner = null;

        // ---------- TRACK: 52 cells + home stretch (5 steps per player) ----------
        // cell indices: RED start = 0, GREEN start = 13, YELLOW=26, BLUE=39 (only RED/GREEN used)
        let trackPoints = [];  // array of {x, y} for each global cell 0..51

        // Precompute beautiful Ludo track positions (classic cross shape)
        function buildTrackPoints() {
            const w = 750, h = 750;
            const centerX = w/2, centerY = h/2;
            const outerRadius = 310;
            const innerRadius = 190;
            const points = [];
            
            // helper to add points along an arc from angleStart to angleEnd, steps
            function addArc(cx, cy, radius, startDeg, endDeg, steps) {
                for (let i = 0; i <= steps; i++) {
                    let t = i / steps;
                    let deg = startDeg + t * (endDeg - startDeg);
                    let rad = deg * Math.PI / 180;
                    points.push({ x: cx + radius * Math.cos(rad), y: cy + radius * Math.sin(rad) });
                }
            }
            
            // We'll create 52 points following a rounded square / outer track ring
            // Standard path: from RED start (bottom right corner) go clockwise
            // Define 4 sides each with 13 cells (including corners)
            let pts = [];
            // bottom edge (right -> left) 13 cells
            for (let i = 0; i <= 12; i++) {
                let x = centerX + 280 - (i * (560/12));
                let y = centerY + 280;
                pts.push({ x, y });
            }
            // left edge (bottom -> top) 13 cells excluding bottom corner already added
            for (let i = 1; i <= 12; i++) {
                let x = centerX - 280;
                let y = centerY + 280 - (i * (560/12));
                pts.push({ x, y });
            }
            // top edge (left -> right)
            for (let i = 1; i <= 12; i++) {
                let x = centerX - 280 + (i * (560/12));
                let y = centerY - 280;
                pts.push({ x, y });
            }
            // right edge (top -> bottom)
            for (let i = 1; i <= 12; i++) {
                let x = centerX + 280;
                let y = centerY - 280 + (i * (560/12));
                pts.push({ x, y });
            }
            // now pts length = 13+12+12+12 = 49, we need 52, add extra 3 to smooth start? but classic ludo needs 52
            // Actually classic is 52 cells: each arm 6 cells + corner start cell = 7 per side => 28? Wait i fix with standard indexing.
            // Better: I'll generate exact 52 by using proper step + known ludo layout.
            // Let's use a reliable table of 52 positions manually crafted for clean look.
            // To avoid misalignment, I hardcode a well-proportioned set derived from geometric calculation.
            // I'll generate using parametric angles to ensure perfect symmetry.
            const angleOffset = -45; // align start at bottom right
            const points52 = [];
            const radius = 305;
            for (let i = 0; i < 52; i++) {
                let angle = (angleOffset + (i / 52) * 360) * Math.PI / 180;
                let x = centerX + radius * Math.cos(angle);
                let y = centerY + radius * Math.sin(angle);
                points52.push({ x, y });
            }
            // rotate so that index 0 sits at bottom-right (RED start visually)
            let redStartIdx = 0;
            let bestDist = Infinity;
            for (let i = 0; i < points52.length; i++) {
                let dist = Math.hypot(points52[i].x - (centerX+270), points52[i].y - (centerY+270));
                if (dist < bestDist) {
                    bestDist = dist;
                    redStartIdx = i;
                }
            }
            const rotated = [];
            for (let i = 0; i < points52.length; i++) {
                rotated.push(points52[(redStartIdx + i) % points52.length]);
            }
            return rotated;
        }

        trackPoints = buildTrackPoints();
        
        // Safe cells (start cells + star cells)
        const startCells = new Set([0, 13, 26, 39]);
        const starCells = new Set([0, 8, 13, 21, 26, 34, 39, 47]);
        function isSafeCell(cell) {
            return startCells.has(cell) || starCells.has(cell);
        }

        // Player data
        const players = {
            RED: {
                color: '#dc3545',
                light: '#ff6b6b',
                startCell: 0,
                homeCorner: { x: 30, y: 570 },  // bottom-left of red home area (adjusted)
                yardPositions: [{x:45,y:595},{x:85,y:595},{x:45,y:645},{x:85,y:645}],
                homePathPositions: [
                    {x: 670, y: 620}, {x: 690, y: 600}, {x: 710, y: 580}, {x: 725, y: 565}, {x: 735, y: 555}
                ],
                finishedPos: { x: 680, y: 660 },
                pieces: [],
                finishedCount: 0
            },
            GREEN: {
                color: '#28a745',
                light: '#6fdc7a',
                startCell: 13,
                homeCorner: { x: 630, y: 30 },
                yardPositions: [{x:645,y:55},{x:685,y:55},{x:645,y:105},{x:685,y:105}],
                homePathPositions: [
                    {x: 70, y: 120}, {x: 55, y: 140}, {x: 40, y: 160}, {x: 28, y: 178}, {x: 18, y: 192}
                ],
                finishedPos: { x: 20, y: 60 },
                pieces: [],
                finishedCount: 0
            }
        };

        // Initialize pieces
        function initPieces() {
            for (let p of ['RED', 'GREEN']) {
                players[p].pieces = [];
                players[p].finishedCount = 0;
                for (let i = 0; i < 4; i++) {
                    players[p].pieces.push({
                        state: 'yard',   // yard, track, home, finished
                        trackCell: null, // if state=track
                        homeStep: null   // 0..4 if state=home
                    });
                }
            }
        }
        initPieces();

        // Helper: get current position of a piece (x,y) for drawing
        function getPiecePosition(player, pieceIdx) {
            const piece = players[player].pieces[pieceIdx];
            const data = players[player];
            if (piece.state === 'yard') {
                return data.yardPositions[pieceIdx];
            } else if (piece.state === 'track') {
                let cell = piece.trackCell;
                if (cell !== null && trackPoints[cell]) return trackPoints[cell];
                return { x: 0, y: 0 };
            } else if (piece.state === 'home') {
                let step = piece.homeStep;
                if (step >= 0 && step <= 4) return data.homePathPositions[step];
                return data.homePathPositions[0];
            } else if (piece.state === 'finished') {
                return { x: data.finishedPos.x + (pieceIdx * 14), y: data.finishedPos.y };
            }
            return { x: 0, y: 0 };
        }

        // Check if player has any valid move with given dice
        function hasAnyValidMove(player, dice) {
            for (let i = 0; i < 4; i++) {
                if (isValidMove(player, i, dice)) return true;
            }
            return false;
        }

        // Validate move for specific piece
        function isValidMove(player, pieceIdx, dice) {
            const piece = players[player].pieces[pieceIdx];
            const pData = players[player];
            if (piece.state === 'finished') return false;
            
            // Yard -> need 6 to bring out
            if (piece.state === 'yard') {
                if (dice === 6) return true;
                return false;
            }
            
            // On main track
            if (piece.state === 'track') {
                let currentCell = piece.trackCell;
                let start = pData.startCell;
                let progress = (currentCell - start + 52) % 52;
                let newProgress = progress + dice;
                if (newProgress < 52) {
                    // still on main track -> move always possible, but capture logic later
                    return true;
                } else {
                    let overshoot = newProgress - 52; // 0..5 (max dice 6)
                    if (overshoot <= 4) {
                        return true; // can enter home stretch
                    } else return false;
                }
            }
            
            // Home stretch
            if (piece.state === 'home') {
                let newStep = piece.homeStep + dice;
                return newStep <= 4;
            }
            return false;
        }

        // Execute move (assumes valid)
        function executeMove(player, pieceIdx, dice) {
            const piece = players[player].pieces[pieceIdx];
            const pData = players[player];
            let captured = false;
            let movedWithSix = (dice === 6);
            
            // Case 1: yard -> open
            if (piece.state === 'yard' && dice === 6) {
                piece.state = 'track';
                piece.trackCell = pData.startCell;
                piece.homeStep = null;
                // check if start cell is occupied by opponent? capture them!
                let opponents = getPiecesOnCell(piece.trackCell, player);
                for (let opp of opponents) {
                    let oppPiece = players[opp.player].pieces[opp.idx];
                    oppPiece.state = 'yard';
                    oppPiece.trackCell = null;
                    oppPiece.homeStep = null;
                    captured = true;
                    // update finished count
                    players[opp.player].finishedCount = players[opp.player].pieces.filter(p => p.state === 'finished').length;
                }
                return { captured, movedWithSix };
            }
            
            // Case 2: main track movement
            if (piece.state === 'track') {
                let current = piece.trackCell;
                let start = pData.startCell;
                let progress = (current - start + 52) % 52;
                let newProgress = progress + dice;
                if (newProgress < 52) {
                    let newCell = (start + newProgress) % 52;
                    // capture enemies on new cell (if not safe)
                    if (!isSafeCell(newCell)) {
                        let enemies = getPiecesOnCell(newCell, player);
                        for (let e of enemies) {
                            let ep = players[e.player].pieces[e.idx];
                            ep.state = 'yard';
                            ep.trackCell = null;
                            ep.homeStep = null;
                            captured = true;
                        }
                        players.GREEN.finishedCount = players.GREEN.pieces.filter(p => p.state === 'finished').length;
                        players.RED.finishedCount = players.RED.pieces.filter(p => p.state === 'finished').length;
                    }
                    piece.trackCell = newCell;
                    return { captured, movedWithSix };
                } else {
                    // enter home stretch
                    let overshoot = newProgress - 52; // 0 to 4
                    piece.state = 'home';
                    piece.homeStep = overshoot;
                    piece.trackCell = null;
                    return { captured, movedWithSix };
                }
            }
            
            // Case 3: home stretch
            if (piece.state === 'home') {
                let newStep = piece.homeStep + dice;
                if (newStep === 4) {
                    piece.state = 'finished';
                    piece.homeStep = null;
                    players[player].finishedCount++;
                    if (players[player].finishedCount === 4) gameWinner = player;
                } else {
                    piece.homeStep = newStep;
                }
                return { captured, movedWithSix };
            }
            return { captured: false, movedWithSix: false };
        }

        // get opponent pieces on a given global cell
        function getPiecesOnCell(cell, currentPlayer) {
            let result = [];
            for (let p of ['RED', 'GREEN']) {
                if (p === currentPlayer) continue;
                for (let i = 0; i < players[p].pieces.length; i++) {
                    let pc = players[p].pieces[i];
                    if (pc.state === 'track' && pc.trackCell === cell) {
                        result.push({ player: p, idx: i });
                    }
                }
            }
            return result;
        }

        // --- turn management ---
        function endTurn() {
            if (gameWinner) return;
            if (extraTurn && diceValue === 6) {
                // keep same player, extra turn already flagged, reset extra flag after move
                extraTurn = false;
                consecutiveSixes = 0;
                diceRolled = false;
                drawBoard();
                return;
            }
            if (!extraTurn) {
                currentPlayer = currentPlayer === 'RED' ? 'GREEN' : 'RED';
                consecutiveSixes = 0;
            }
            diceRolled = false;
            extraTurn = false;
            document.getElementById('gameMsg').innerText = `${currentPlayer}'s turn. Roll dice!`;
            drawBoard();
        }

        function afterMove(captured, wasSix) {
            if (gameWinner) {
                drawBoard();
                document.getElementById('gameMsg').innerText = `🏆 ${gameWinner} WINS! 🏆`;
                return;
            }
            if (wasSix && diceValue === 6) {
                consecutiveSixes++;
                if (consecutiveSixes === 3) {
                    document.getElementById('gameMsg').innerText = `⚠️ Three sixes! Turn ends.`;
                    extraTurn = false;
                    consecutiveSixes = 0;
                    endTurn();
                } else {
                    extraTurn = true;
                    document.getElementById('gameMsg').innerText = `🎲 ${currentPlayer} gets another turn! (6)`;
                    diceRolled = false;
                    drawBoard();
                }
            } else {
                consecutiveSixes = 0;
                extraTurn = false;
                endTurn();
            }
            drawBoard();
        }

        function tryMove(pieceIdx) {
            if (!diceRolled) {
                document.getElementById('gameMsg').innerText = `Roll the dice first!`;
                return false;
            }
            if (gameWinner) return false;
            if (!isValidMove(currentPlayer, pieceIdx, diceValue)) {
                document.getElementById('gameMsg').innerText = `Can't move that piece!`;
                return false;
            }
            let result = executeMove(currentPlayer, pieceIdx, diceValue);
            diceRolled = false;
            afterMove(result.captured, result.movedWithSix);
            return true;
        }

        function rollDice() {
            if (gameWinner) {
                document.getElementById('gameMsg').innerText = `Game over! ${gameWinner} won.`;
                return;
            }
            if (diceRolled) {
                document.getElementById('gameMsg').innerText = `Already rolled! Move a piece.`;
                return;
            }
            let roll = Math.floor(Math.random() * 6) + 1;
            diceValue = roll;
            diceRolled = true;
            document.getElementById('diceValue').innerHTML = roll;
            // check for any possible moves
            if (!hasAnyValidMove(currentPlayer, diceValue)) {
                document.getElementById('gameMsg').innerText = `No moves! Turn ends.`;
                // end turn automatically
                diceRolled = false;
                endTurn();
                drawBoard();
            } else {
                document.getElementById('gameMsg').innerText = `${currentPlayer} rolled ${roll}. Choose a piece to move.`;
                drawBoard();
            }
        }

        // ---------- DRAWING ENGINE ----------
        function drawLudoBackground() {
            // Classic board drawing
            ctx.fillStyle = '#f7e3b2';
            ctx.fillRect(0, 0, 750, 750);
            // home triangles / large squares
            const corners = [
                { x: 10, y: 10, w: 160, h: 160, col: '#dc3545' },   // red
                { x: 580, y: 10, w: 160, h: 160, col: '#28a745' },   // green
                { x: 10, y: 580, w: 160, h: 160, col: '#ffc107' },   // yellow (inactive)
                { x: 580, y: 580, w: 160, h: 160, col: '#0d6efd' }    // blue (inactive)
            ];
            for (let c of corners) {
                ctx.fillStyle = c.col;
                ctx.fillRect(c.x, c.y, c.w, c.h);
                ctx.strokeStyle = '#a05e2c';
                ctx.lineWidth = 3;
                ctx.strokeRect(c.x, c.y, c.w, c.h);
                ctx.fillStyle = 'rgba(255,245,190,0.3)';
                ctx.fillRect(c.x+8, c.y+8, c.w-16, c.h-16);
            }
            // center square
            ctx.fillStyle = '#e2b87a';
            ctx.fillRect(260, 260, 230, 230);
            ctx.fillStyle = '#c48f4a';
            for (let i = 0; i < 4; i++) ctx.fillRect(300+i*30, 300, 20, 120);
            // stars
            ctx.font = '28px "Segoe UI"';
            ctx.fillStyle = '#f7c56e';
            ctx.fillText('★', 680, 680);
            ctx.fillText('★', 45, 50);
            ctx.fillText('★', 55, 690);
            ctx.fillText('★', 685, 55);
        }

        function drawPathCells() {
            for (let i = 0; i < trackPoints.length; i++) {
                let pt = trackPoints[i];
                ctx.beginPath();
                ctx.arc(pt.x, pt.y, 14, 0, 2 * Math.PI);
                ctx.fillStyle = '#fff2df';
                ctx.fill();
                ctx.strokeStyle = '#bd8242';
                ctx.lineWidth = 1.8;
                ctx.stroke();
                if (isSafeCell(i)) {
                    ctx.beginPath();
                    ctx.arc(pt.x, pt.y, 8, 0, 2 * Math.PI);
                    ctx.fillStyle = '#ffcd7e';
                    ctx.fill();
                    ctx.fillStyle = '#a55d2a';
                    ctx.font = 'bold 16px monospace';
                    ctx.fillText('✪', pt.x-6, pt.y+6);
                }
            }
        }

        function drawPieces() {
            for (let player of ['RED', 'GREEN']) {
                for (let idx = 0; idx < 4; idx++) {
                    let pos = getPiecePosition(player, idx);
                    let piece = players[player].pieces[idx];
                    let color = players[player].color;
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, 13, 0, 2 * Math.PI);
                    ctx.fillStyle = color;
                    ctx.fill();
                    ctx.strokeStyle = '#ffecb3';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 18px "Segoe UI"';
                    ctx.fillText(idx+1, pos.x-6, pos.y+7);
                    // highlight selected piece (if any and dice rolled and it's turn)
                    if (diceRolled && currentPlayer === player && !gameWinner && players[player].pieces[idx] === piece) {
                        ctx.beginPath();
                        ctx.arc(pos.x, pos.y, 17, 0, 2 * Math.PI);
                        ctx.strokeStyle = 'gold';
                        ctx.lineWidth = 3.5;
                        ctx.stroke();
                    }
                }
            }
        }

        function drawTurnInfo() {
            document.getElementById('turnLed').style.backgroundColor = currentPlayer === 'RED' ? '#dc3545' : '#28a745';
            document.getElementById('turnText').innerText = currentPlayer === 'RED' ? "🔴 RED's Turn" : "🟢 GREEN's Turn";
            if (!diceRolled) document.getElementById('diceValue').innerHTML = diceValue || '⚀';
            else document.getElementById('diceValue').innerHTML = diceValue;
        }

        function drawBoard() {
            drawLudoBackground();
            drawPathCells();
            drawPieces();
            drawTurnInfo();
            if (gameWinner) {
                ctx.font = 'bold 40px "Segoe UI"';
                ctx.shadowBlur = 4;
                ctx.fillStyle = '#FFD966';
                ctx.shadowColor = 'black';
                ctx.fillText(`${gameWinner} VICTORY!`, 230, 100);
                ctx.shadowBlur = 0;
            }
        }

        // ----- Piece selection via canvas click -----
        function handleCanvasClick(e) {
            if (gameWinner) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let mouseX = (e.clientX - rect.left) * scaleX;
            let mouseY = (e.clientY - rect.top) * scaleY;
            
            // check pieces of current player
            for (let idx = 0; idx < 4; idx++) {
                let pos = getPiecePosition(currentPlayer, idx);
                let dx = mouseX - pos.x;
                let dy = mouseY - pos.y;
                if (Math.hypot(dx, dy) < 18) {
                    tryMove(idx);
                    return;
                }
            }
            document.getElementById('gameMsg').innerText = `Click on your piece to move!`;
        }

        // Reset game function (optional but nice)
        function resetGame() {
            initPieces();
            currentPlayer = 'RED';
            diceValue = 0;
            diceRolled = false;
            extraTurn = false;
            consecutiveSixes = 0;
            gameWinner = null;
            drawBoard();
            document.getElementById('gameMsg').innerText = "Game restarted! RED rolls first.";
        }

        // Event bindings
        document.getElementById('rollBtn').addEventListener('click', rollDice);
        canvas.addEventListener('click', handleCanvasClick);
        
        // initial draw
        drawBoard();
        document.getElementById('gameMsg').innerText = "RED's turn. Roll the dice!";
    })();
</script>
</body>
</html>
