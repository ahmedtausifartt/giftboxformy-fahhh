<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Gift For You</title>
    <style>
        :root {
            --box-color: #ff4757;
            --ribbon-color: #ffa502;
            --flower-color: #ff6b81;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffeaa7;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        /* --- THE BOX --- */
        .gift-box {
            position: relative;
            width: 150px;
            height: 150px;
            background-color: var(--box-color);
            border-radius: 0 0 8px 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            z-index: 2;
        }

        /* Horizontal Ribbon on Box */
        .gift-box::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50px;
            width: 100%;
            height: 30px;
            background-color: var(--ribbon-color);
        }

        /* Vertical Ribbon on Box */
        .gift-box::after {
            content: '';
            position: absolute;
            left: 60px;
            top: 0;
            width: 30px;
            height: 100%;
            background-color: var(--ribbon-color);
        }

        /* --- THE LID --- */
        .box-lid {
            position: absolute;
            bottom: 145px;
            width: 160px;
            height: 40px;
            background-color: var(--box-color);
            border-radius: 4px;
            box-shadow: 0 4px 5px rgba(0,0,0,0.1);
            z-index: 3;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Ribbon on Lid */
        .box-lid::before {
            content: '';
            position: absolute;
            left: 65px;
            top: 0;
            width: 30px;
            height: 100%;
            background-color: var(--ribbon-color);
        }

        /* The Ribbon Bow/Loop to click */
        .ribbon-bow {
            position: absolute;
            top: -25px;
            left: 55px;
            width: 50px;
            height: 25px;
            z-index: 4;
        }

        .ribbon-bow::before, .ribbon-bow::after {
            content: '';
            position: absolute;
            width: 25px;
            height: 25px;
            border: 5px solid var(--ribbon-color);
            border-radius: 50% 50% 0 50%;
            transform: rotate(-45deg);
        }

        .ribbon-bow::after {
            left: 20px;
            border-radius: 50% 50% 50% 0;
            transform: rotate(45deg);
        }

        /* --- THE FLOWER --- */
        .flower {
            position: absolute;
            bottom: 100px;
            width: 20px;
            height: 80px;
            background-color: #2ed573; /* Stem */
            z-index: 1;
            transform: scale(0);
            transform-origin: bottom center;
            transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s;
            border-radius: 4px;
        }

        .flower-head {
            position: absolute;
            top: -20px;
            left: -20px;
            width: 60px;
            height: 60px;
        }

        /* Flower Petals */
        .petal {
            position: absolute;
            width: 25px;
            height: 25px;
            background-color: var(--flower-color);
            border-radius: 50%;
        }
        .petal-1 { top: 0; left: 17px; }
        .petal-2 { top: 17px; left: 35px; }
        .petal-3 { top: 35px; left: 17px; }
        .petal-4 { top: 17px; left: 0; }
        
        /* Flower Center */
        .flower-center {
            position: absolute;
            top: 17px;
            left: 17px;
            width: 26px;
            height: 26px;
            background-color: #ffa502;
            border-radius: 50%;
        }

        /* --- ANIMATION STATES (When Open) --- */
        .container.open .box-lid {
            transform: translateY(-80px) rotate(-20px) translateX(-40px);
        }

        .container.open .flower {
            transform: scale(1.4) translateY(-40px);
        }

        /* Instruction Text */
        .hint {
            margin-top: 30px;
            color: #2f3542;
            font-weight: bold;
            font-size: 1.1rem;
            transition: opacity 0.5s;
        }
        .container.open .hint {
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="container" id="giftContainer">
        <div class="box-lid">
            <div class="ribbon-bow"></div>
        </div>

        <div class="flower">
            <div class="flower-head">
                <div class="petal petal-1"></div>
                <div class="petal petal-2"></div>
                <div class="petal petal-3"></div>
                <div class="petal petal-4"></div>
                <div class="flower-center"></div>
            </div>
        </div>

        <div class="gift-box"></div>

        <p class="hint">Click the ribbon to open!</p>
    </div>

    <script>
        const container = document.getElementById('giftContainer');
        
        container.addEventListener('click', () => {
            container.classList.toggle('open');
        });
    </script>

</body>
</html>
