<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Love Locket</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fce4ec, #f8bbd0);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .locket-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        /* ----- The locket container ----- */
        .locket {
            position: relative;
            width: 200px;
            height: 200px;
            cursor: pointer;
            user-select: none;
            /* the hinge is at the top centre */
            transform-origin: 50% 0%;
        }

        /* ----- Image behind the heart ----- */
        .image-container {
            position: absolute;
            top: 10%;
            left: 10%;
            width: 80%;
            height: 80%;
            border-radius: 50%;
            overflow: hidden;
            background: #fff5f5;
            box-shadow: inset 0 0 0 3px #ff8a80, 0 0 0 3px #ff8a80;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Highlight the placeholder for the image */
        .image-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fff0f0;
            color: #d32f2f;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            border: 3px dashed #ff1744;
            border-radius: 50%;
            box-sizing: border-box;
        }

        .image-placeholder span {
            background: #ffcdd2;
            padding: 4px 12px;
            border-radius: 20px;
            margin-top: 6px;
            font-size: 12px;
            color: #b71c1c;
        }

        /* ----- SVG heart (two halves) ----- */
        .heart-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* click goes through to the container */
        }

        .heart-half {
            transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-origin: 0px -20px; /* centre top of heart (hinge) */
        }

        .heart-half path {
            fill: #e53935;
            stroke: #b71c1c;
            stroke-width: 2;
            transition: fill 0.3s;
        }

        /* When open, rotate halves outward */
        .locket.open .half-left {
            transform: rotate(-70deg);
        }
        .locket.open .half-right {
            transform: rotate(70deg);
        }

        /* Hover effect on closed heart */
        .locket:not(.open):hover .heart-half path {
            fill: #ef5350;
        }

        /* ----- Little instruction text ----- */
        .hint {
            color: #6d1a1a;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.6);
            padding: 8px 18px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: opacity 0.3s;
        }

        .hint i {
            font-style: normal;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* small chain decoration */
        .chain {
            width: 4px;
            height: 40px;
            background: #bdbdbd;
            border-radius: 2px;
            margin-bottom: 4px;
            box-shadow: 0 0 0 2px #9e9e9e;
        }
    </style>
</head>
<body>

<div class="locket-wrapper">
    <!-- decorative chain -->
    <div class="chain"></div>

    <div class="locket" id="locket">
        <!-- Inner image container -->
        <div class="image-container" id="imageContainer">
            <!-- ============================================= -->
            <!--  INSERT YOUR IMAGE HERE                       -->
            <!--  Replace the <div> below with an <img> tag   -->
            <!--  Example: <img src="your-photo.jpg" alt="Love"> -->
            <!-- ============================================= -->
            <div class="image-placeholder">
                ❤️
                <span>Insert your image here</span>
                <small style="font-size:10px; margin-top:4px;">(replace this div with &lt;img&gt;)</small>
            </div>
            <!-- 
                <!-- To add your image, delete the placeholder div above 
                     and uncomment the line below: -->
                <!-- <img src="path/to/your/image.jpg" alt="Locket image"> -->
            -->
        </div>

        <!-- SVG heart halves -->
        <svg class="heart-svg" viewBox="-40 -40 80 80" preserveAspectRatio="xMidYMid meet">
            <defs>
                <!-- Clip paths to split the heart vertically -->
                <clipPath id="clipLeft">
                    <rect x="-40" y="-40" width="40" height="80" />
                </clipPath>
                <clipPath id="clipRight">
                    <rect x="0" y="-40" width="40" height="80" />
                </clipPath>
            </defs>

            <!-- Left half -->
            <g class="heart-half half-left" clip-path="url(#clipLeft)" style="transform-origin: 0px -20px;">
                <path d="M 0,-20 
                         C -15,-35 -35,-20 -35,-5 
                         C -35,15 0,35 0,40 
                         C 0,35 35,15 35,-5 
                         C 35,-20 15,-35 0,-20 Z" />
            </g>

            <!-- Right half -->
            <g class="heart-half half-right" clip-path="url(#clipRight)" style="transform-origin: 0px -20px;">
                <path d="M 0,-20 
                         C -15,-35 -35,-20 -35,-5 
                         C -35,15 0,35 0,40 
                         C 0,35 35,15 35,-5 
                         C 35,-20 15,-35 0,-20 Z" />
            </g>
        </svg>
    </div>

    <div class="hint" id="hint">💋 Click the heart to open/close</div>
</div>

<script>
    (function() {
        const locket = document.getElementById('locket');
        const hint = document.getElementById('hint');

        // ---------- Sound effect (smooch) using Web Audio ----------
        function playKissSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const sampleRate = audioCtx.sampleRate;
                const duration = 0.25; // seconds

                // Create a buffer with white noise + envelope
                const buffer = audioCtx.createBuffer(1, sampleRate * duration, sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < data.length; i++) {
                    // noise amplitude with quick decay + a little pop at start
                    const env = Math.exp(-i / (sampleRate * 0.06));
                    data[i] = (Math.random() * 2 - 1) * env;
                }

                const source = audioCtx.createBufferSource();
                source.buffer = buffer;

                // Add a gain node to shape volume
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

                // Add a little filter to make it less harsh
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 2000;

                source.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);

                source.start();
                // resume context if suspended (autoplay policy)
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            } catch (e) {
                // fallback: silent if audio not supported
                console.warn('Audio not supported');
            }
        }

        // ---------- Toggle locket on click ----------
        locket.addEventListener('click', function(e) {
            // Toggle open class
            this.classList.toggle('open');

            // Play sound
            playKissSound();

            // Update hint text
            const isOpen = this.classList.contains('open');
            hint.innerHTML = isOpen ? '💋 Love is open! ❤️' : '💋 Click to open again';
        });

        // For accessibility: also allow Enter/Space
        locket.setAttribute('tabindex', '0');
        locket.setAttribute('role', 'button');
        locket.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                this.click();
            }
        });

        // Optional: initial animation to show it works (open after 1 second, then close after 3)
        setTimeout(() => {
            locket.classList.add('open');
            hint.innerHTML = '💋 Love is open! ❤️';
            playKissSound();
        }, 800);
        setTimeout(() => {
            locket.classList.remove('open');
            hint.innerHTML = '💋 Click the heart to open/close';
        }, 3000);
    })();
</script>

</body>
</html>
